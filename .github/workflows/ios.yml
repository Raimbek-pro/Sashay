name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and Test
        run: |
          xcodebuild test \
          -project Sashay.xcodeproj \
          -scheme Sashay \
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
